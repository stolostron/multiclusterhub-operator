apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: search-v2-operator-validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: search-v2-operator-webhook-service
      namespace: '{{ default "system" .Values.global.namespace }}'
      path: /validate-search-open-cluster-management-io-v1alpha1-collectorconfig
  failurePolicy: Fail
  name: vcollectorconfig.kb.io
  rules:
  - apiGroups:
    - search.open-cluster-management.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - collectorconfigs
  sideEffects: None
