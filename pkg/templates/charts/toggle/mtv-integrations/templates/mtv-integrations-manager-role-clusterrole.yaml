  resources:
  - apiservers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - managedclusters
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - clusterview.open-cluster-management.io
  resources:
  - managedclusters
  - kubevirtprojects
  - userpermissions
  verbs:
  - get
  - list
  - watch
- apiGroups:
