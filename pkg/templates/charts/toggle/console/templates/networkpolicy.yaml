{{- if .Values.global.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: console-networkpolicy
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app: console
      component: console
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Same-namespace traffic
    - from:
        - podSelector: {}
    # OpenShift router (for Route ingress)
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 5353
    # Kubernetes API
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              component: apiserver
      ports:
        - protocol: TCP
          port: 6443
    # HTTPS egress (external APIs, registries)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # AWS metadata
      ports:
        - protocol: TCP
          port: 443
{{- end }}
