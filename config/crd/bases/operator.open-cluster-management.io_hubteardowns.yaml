---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: hubteardowns.operator.open-cluster-management.io
spec:
  group: operator.open-cluster-management.io
  names:
    kind: HubTeardown
    listKind: HubTeardownList
    plural: hubteardowns
    shortNames:
    - htd
    singular: hubteardown
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Current teardown phase
      jsonPath: .status.phase
      name: Phase
      type: string
    - description: Whether dry-run mode is active
      jsonPath: .spec.dryRun
      name: Dry-Run
      type: boolean
    - description: Number of blocking resources
      jsonPath: .status.dryRunReport.totalBlockingResources
      name: Blocking
      type: integer
    - description: Number of cloud-risk resources
      jsonPath: .status.dryRunReport.totalCloudRiskResources
      name: Cloud-Risk
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          HubTeardown is the Schema for the hubteardowns API. It provides orchestrated,
          observable, and safe RHACM uninstallation with dependency graph scanning,
          ordered phase execution, and explicit cloud resource leak warnings.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HubTeardownSpec defines the desired state of HubTeardown.
            properties:
              acknowledgeCloudResourceRisk:
                description: |-
                  AcknowledgeCloudResourceRisk enables Tier 1 (cloud-protecting) finalizer
                  patching. Setting this to true means the admin accepts that cloud
                  infrastructure (VMs, LBs, storage, DNS) may be orphaned and will
                  require manual cleanup in the cloud provider console.
                type: boolean
              approvedDestructiveActions:
                description: |-
                  ApprovedDestructiveActions enables Tier 2 (non-cloud) finalizer
                  patching for stuck resources. Only evaluated when dryRun is false.
                type: boolean
              dryRun:
                default: true
                description: |-
                  DryRun when true (the default) causes the controller to scan and report
                  without mutating any cluster resources. Set to false to begin teardown.
                  Can be toggled back to true at any time to pause and re-scan.
                type: boolean
              forceFinalizerTimeout:
                description: |-
                  ForceFinalizerTimeout is the duration to wait for a controller to
                  process its own finalizer before the teardown controller intervenes.
                  Defaults to 5m.
                type: string
              maxDuration:
                description: |-
                  MaxDuration is the maximum wall-clock time allowed for the entire
                  teardown. If exceeded, the controller sets a Stalled condition with
                  guidance on what is blocking. Defaults to 2h.
                type: string
            required:
            - dryRun
            type: object
          status:
            description: HubTeardownStatus defines the observed state of HubTeardown.
            properties:
              activeSince:
                description: |-
                  ActiveSince is the timestamp when the teardown transitioned from
                  dry-run to active execution. Used to calculate overall stall timeout.
                format: date-time
                type: string
              blockingResources:
                description: |-
                  BlockingResources lists resources that prevent MCH deletion via
                  the validating webhook.
                items:
                  description: BlockingResource identifies a resource that prevents
                    MCH deletion.
                  properties:
                    group:
                      description: Group is the API group of the resource.
                      type: string
                    kind:
                      description: Kind is the resource kind.
                      type: string
                    name:
                      description: Name is the resource name.
                      type: string
                    namespace:
                      description: Namespace is the resource namespace (empty for
                        cluster-scoped).
                      type: string
                    reason:
                      description: Reason explains why this resource blocks uninstall.
                      type: string
                  required:
                  - group
                  - kind
                  - name
                  - reason
                  type: object
                type: array
              cloudResourceWarnings:
                description: |-
                  CloudResourceWarnings lists resources with cloud-protecting finalizers
                  and their platform-specific risk descriptions.
                items:
                  description: CloudResourceWarning describes a resource whose finalizer
                    protects cloud infrastructure.
                  properties:
                    acknowledged:
                      description: Acknowledged indicates whether the admin has reviewed
                        this warning.
                      type: boolean
                    finalizer:
                      description: Finalizer is the specific finalizer string that
                        protects cloud resources.
                      type: string
                    platform:
                      description: Platform is the cloud platform (AWS, Azure, GCP,
                        etc.) if detectable.
                      type: string
                    resource:
                      description: Resource identifies the Kubernetes resource.
                      properties:
                        group:
                          description: Group is the API group of the resource.
                          type: string
                        kind:
                          description: Kind is the resource kind.
                          type: string
                        name:
                          description: Name is the resource name.
                          type: string
                        namespace:
                          description: Namespace is the resource namespace (empty
                            for cluster-scoped).
                          type: string
                      required:
                      - group
                      - kind
                      - name
                      type: object
                    riskSummary:
                      description: |-
                        RiskSummary is a human-readable description of what cloud resources
                        will be orphaned if this finalizer is removed.
                      type: string
                  required:
                  - acknowledged
                  - finalizer
                  - resource
                  - riskSummary
                  type: object
                type: array
              conditions:
                description: Conditions reflect the current state of the teardown
                  process.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              dryRunReport:
                description: |-
                  DryRunReport contains the full teardown preview generated during
                  dry-run mode. Updated on each reconcile while dryRun is true.
                properties:
                  plannedPhases:
                    description: PlannedPhases is an ordered list of phases with per-phase
                      detail.
                    items:
                      description: PlannedPhase describes what a single teardown phase
                        will do.
                      properties:
                        action:
                          description: Action is a short description of what this
                            phase will do.
                          type: string
                        cloudRiskResources:
                          description: CloudRiskResources is the count of Tier 1 resources
                            in this phase.
                          type: integer
                        details:
                          description: Details is a per-resource breakdown of what
                            will happen.
                          items:
                            type: string
                          type: array
                        phase:
                          description: Phase name (matches TeardownPhase enum).
                          type: string
                        resourcesAffected:
                          description: ResourcesAffected is the count of resources
                            this phase touches.
                          type: integer
                      required:
                      - action
                      - phase
                      - resourcesAffected
                      type: object
                    type: array
                  scanTime:
                    description: ScanTime is when the last scan was performed.
                    format: date-time
                    type: string
                  summary:
                    description: Summary is a human-readable overview of the teardown
                      plan.
                    type: string
                  totalBlockingResources:
                    description: TotalBlockingResources is the count of resources
                      blocking uninstall.
                    type: integer
                  totalCloudRiskResources:
                    description: TotalCloudRiskResources is the count of resources
                      with Tier 1 finalizers.
                    type: integer
                required:
                - plannedPhases
                - scanTime
                - summary
                - totalBlockingResources
                - totalCloudRiskResources
                type: object
              phase:
                description: Phase is the current high-level phase of the teardown
                  process.
                type: string
              phases:
                description: Phases tracks the status of each teardown phase.
                items:
                  description: TeardownPhaseStatus tracks the execution state of one
                    teardown phase.
                  properties:
                    completionTime:
                      description: CompletionTime is when this phase finished.
                      format: date-time
                      type: string
                    message:
                      description: Message provides human-readable detail about the
                        phase state.
                      type: string
                    phase:
                      description: Phase name.
                      type: string
                    startTime:
                      description: StartTime is when this phase began executing.
                      format: date-time
                      type: string
                    state:
                      description: State is the current execution state of this phase.
                      type: string
                  required:
                  - phase
                  - state
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
